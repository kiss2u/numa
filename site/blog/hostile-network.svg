<svg xmlns="http://www.w3.org/2000/svg" font-family="'DM Sans', system-ui, sans-serif" font-size="12" viewBox="0 0 720 330"><defs><filter id="shadow" width="106%" height="106%" x="-3%" y="-3%"><feDropShadow dx="0" dy="1" flood-opacity=".06" stdDeviation="2"/></filter><pattern id="wasted-hatch" width="7" height="7" patternTransform="rotate(-45)" patternUnits="userSpaceOnUse"><rect width="7" height="7" fill="#8b7f6f"/><line x1="0" x2="0" y1="0" y2="7" stroke="#3d3427" stroke-width="1.6" opacity=".38"/></pattern></defs><rect width="720" height="330" fill="#faf7f2" rx="8"/><text x="360" y="32" fill="#2c2418" font-family="'Instrument Serif', Georgia, serif" font-size="15" font-weight="600" letter-spacing="-.02em" text-anchor="middle">TCP fallback with UDP auto-disable</text><text x="360" y="50" fill="#a39888" font-size="11" text-anchor="middle">Latency profile on an ISP that blocks outbound UDP:53</text><g transform="translate(160, 70)"><rect width="14" height="12" fill="url(#wasted-hatch)" rx="2"/><text x="22" y="10" fill="#6b5e4f" font-size="11">UDP timeout — 800 ms wasted</text><rect width="14" height="12" x="220" fill="#c0623a" rx="2"/><text x="242" y="10" fill="#6b5e4f" font-size="11">TCP — successful exchange</text></g><line x1="90" x2="570" y1="108" y2="108" stroke="#d4cbba" stroke-width="1"/><line x1="90" x2="90" y1="106" y2="112" stroke="#a39888" stroke-width="1"/><line x1="210" x2="210" y1="106" y2="112" stroke="#a39888" stroke-width="1"/><line x1="330" x2="330" y1="106" y2="112" stroke="#a39888" stroke-width="1"/><line x1="410" x2="410" y1="106" y2="112" stroke="#a39888" stroke-width="1"/><line x1="530" x2="530" y1="106" y2="112" stroke="#a39888" stroke-width="1"/><text x="90" y="102" fill="#a39888" font-family="'JetBrains Mono', monospace" font-size="9" text-anchor="middle">0</text><text x="210" y="102" fill="#a39888" font-family="'JetBrains Mono', monospace" font-size="9" text-anchor="middle">300</text><text x="330" y="102" fill="#a39888" font-family="'JetBrains Mono', monospace" font-size="9" text-anchor="middle">600</text><text x="410" y="102" fill="#a39888" font-family="'JetBrains Mono', monospace" font-size="9" text-anchor="middle">800</text><text x="530" y="102" fill="#a39888" font-family="'JetBrains Mono', monospace" font-size="9" text-anchor="middle">1100 ms</text><text x="82" y="135" fill="#6b5e4f" font-size="11" text-anchor="end">query 1</text><rect width="320" height="16" x="90" y="125" fill="url(#wasted-hatch)" rx="2"/><rect width="120" height="16" x="410" y="125" fill="#c0623a" rx="2"/><text x="540" y="137" fill="#6b5e4f" font-family="'JetBrains Mono', monospace" font-size="10">1,100 ms</text><text x="82" y="159" fill="#6b5e4f" font-size="11" text-anchor="end">query 2</text><rect width="320" height="16" x="90" y="149" fill="url(#wasted-hatch)" rx="2"/><rect width="120" height="16" x="410" y="149" fill="#c0623a" rx="2"/><text x="540" y="161" fill="#6b5e4f" font-family="'JetBrains Mono', monospace" font-size="10">1,100 ms</text><text x="82" y="183" fill="#6b5e4f" font-size="11" text-anchor="end">query 3</text><rect width="320" height="16" x="90" y="173" fill="url(#wasted-hatch)" rx="2"/><rect width="120" height="16" x="410" y="173" fill="#c0623a" rx="2"/><text x="540" y="185" fill="#6b5e4f" font-family="'JetBrains Mono', monospace" font-size="10">1,100 ms</text><line x1="90" x2="570" y1="206" y2="206" stroke="#6b7c4e" stroke-dasharray="4 3" stroke-width="1"/><rect width="260" height="18" x="200" y="198" fill="#faf7f2" stroke="#6b7c4e" stroke-width="1" filter="url(#shadow)" rx="9"/><text x="330" y="210" fill="#566540" font-size="10" font-weight="500" text-anchor="middle">3 consecutive failures → UDP auto-disabled</text><text x="82" y="235" fill="#6b5e4f" font-size="11" text-anchor="end">query 4</text><rect width="120" height="16" x="90" y="225" fill="#c0623a" rx="2"/><text x="220" y="237" fill="#6b5e4f" font-family="'JetBrains Mono', monospace" font-size="10">300 ms</text><text x="82" y="259" fill="#6b5e4f" font-size="11" text-anchor="end">query 5</text><rect width="120" height="16" x="90" y="249" fill="#c0623a" rx="2"/><text x="220" y="261" fill="#6b5e4f" font-family="'JetBrains Mono', monospace" font-size="10">300 ms</text><g transform="translate(300, 246)"><line x1="0" x2="0" y1="-10" y2="22" stroke="#6b7c4e" stroke-dasharray="2 2" stroke-width="1"/><text x="10" y="6" fill="#566540" font-size="10" font-style="italic">3.7× faster — no more UDP wait</text></g><text x="360" y="298" fill="#a39888" font-size="10" font-style="italic" text-anchor="middle">The flag resets on network change (LAN IP delta). Switch back to a clean network and UDP is tried again.</text></svg>