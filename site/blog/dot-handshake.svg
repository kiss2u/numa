<svg xmlns="http://www.w3.org/2000/svg" font-family="'DM Sans', system-ui, sans-serif" font-size="12" viewBox="0 0 720 360"><defs><marker id="arr-amber" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#c0623a" d="M 0 0 L 10 5 L 0 10 z"/></marker><marker id="arr-dim" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#a39888" d="M 0 0 L 10 5 L 0 10 z"/></marker><filter id="shadow" width="106%" height="106%" x="-3%" y="-3%"><feDropShadow dx="0" dy="1" flood-opacity=".06" stdDeviation="2"/></filter></defs><rect width="720" height="360" fill="#faf7f2" rx="8"/><text x="360" y="32" fill="#2c2418" font-family="'Instrument Serif', Georgia, serif" font-size="15" font-weight="600" letter-spacing="-.02em" text-anchor="middle">UDP vs DoT — one lookup, three scenarios</text><text x="360" y="50" fill="#a39888" font-size="11" text-anchor="middle">Time flows downward. Amber = DNS work. Gray = TCP/TLS handshake overhead.</text><g transform="translate(20, 0)"><text x="90" y="84" fill="#2c2418" font-size="13" font-weight="600" text-anchor="middle">Plain UDP DNS</text><text x="90" y="101" fill="#a39888" font-size="10" letter-spacing=".06em" text-anchor="middle">PORT 53 · CLEARTEXT</text><text x="25" y="128" fill="#6b5e4f" font-size="10">client</text><text x="133" y="128" fill="#6b5e4f" font-size="10">server</text><line x1="35" x2="35" y1="138" y2="198" stroke="#d4cbba" stroke-dasharray="2 3" stroke-width="1"/><line x1="145" x2="145" y1="138" y2="198" stroke="#d4cbba" stroke-dasharray="2 3" stroke-width="1"/><line x1="37" x2="143" y1="148" y2="160" stroke="#c0623a" stroke-width="2" marker-end="url(#arr-amber)"/><text x="90" y="143" fill="#9e4e2d" font-size="10" font-weight="500" text-anchor="middle">query</text><line x1="143" x2="37" y1="178" y2="190" stroke="#c0623a" stroke-width="2" marker-end="url(#arr-amber)"/><text x="90" y="205" fill="#9e4e2d" font-size="10" font-weight="500" text-anchor="middle">response</text><rect width="140" height="32" x="20" y="225" fill="#faf7f2" stroke="#d4cbba" stroke-width="1" filter="url(#shadow)" rx="4"/><text x="90" y="241" fill="#a39888" font-size="9" letter-spacing=".04em" text-anchor="middle">TOTAL LATENCY</text><text x="90" y="253" fill="#c0623a" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">1 × RTT</text></g><g transform="translate(270, 0)"><text x="90" y="84" fill="#2c2418" font-size="13" font-weight="600" text-anchor="middle">DoT — first query</text><text x="90" y="101" fill="#a39888" font-size="10" letter-spacing=".06em" text-anchor="middle">PORT 853 · NEW CONNECTION</text><text x="25" y="128" fill="#6b5e4f" font-size="10">client</text><text x="133" y="128" fill="#6b5e4f" font-size="10">server</text><line x1="35" x2="35" y1="138" y2="308" stroke="#d4cbba" stroke-dasharray="2 3" stroke-width="1"/><line x1="145" x2="145" y1="138" y2="308" stroke="#d4cbba" stroke-dasharray="2 3" stroke-width="1"/><line x1="37" x2="143" y1="145" y2="153" stroke="#a39888" stroke-width="1.5" marker-end="url(#arr-dim)"/><line x1="143" x2="37" y1="163" y2="171" stroke="#a39888" stroke-width="1.5" marker-end="url(#arr-dim)"/><line x1="37" x2="143" y1="181" y2="189" stroke="#a39888" stroke-width="1.5" marker-end="url(#arr-dim)"/><text x="168" y="170" fill="#a39888" font-family="'JetBrains Mono', monospace" font-size="9">1 rtt</text><text x="90" y="143" fill="#6b5e4f" font-size="9" font-style="italic" text-anchor="middle">TCP handshake</text><line x1="37" x2="143" y1="208" y2="216" stroke="#a39888" stroke-width="1.5" marker-end="url(#arr-dim)"/><line x1="143" x2="37" y1="226" y2="234" stroke="#a39888" stroke-width="1.5" marker-end="url(#arr-dim)"/><text x="168" y="222" fill="#a39888" font-family="'JetBrains Mono', monospace" font-size="9">2 rtt</text><text x="90" y="205" fill="#6b5e4f" font-size="9" font-style="italic" text-anchor="middle">TLS 1.3 handshake</text><line x1="37" x2="143" y1="253" y2="261" stroke="#c0623a" stroke-width="2" marker-end="url(#arr-amber)"/><line x1="143" x2="37" y1="271" y2="279" stroke="#c0623a" stroke-width="2" marker-end="url(#arr-amber)"/><text x="168" y="267" fill="#a39888" font-family="'JetBrains Mono', monospace" font-size="9">3 rtt</text><text x="90" y="250" fill="#9e4e2d" font-size="10" font-weight="500" text-anchor="middle">query + response</text><rect width="140" height="32" x="20" y="295" fill="#faf7f2" stroke="#d4cbba" stroke-width="1" filter="url(#shadow)" rx="4"/><text x="90" y="311" fill="#a39888" font-size="9" letter-spacing=".04em" text-anchor="middle">TOTAL LATENCY</text><text x="90" y="323" fill="#c0623a" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">3 × RTT</text></g><g transform="translate(520, 0)"><text x="90" y="84" fill="#2c2418" font-size="13" font-weight="600" text-anchor="middle">DoT — reused session</text><text x="90" y="101" fill="#a39888" font-size="10" letter-spacing=".06em" text-anchor="middle">PORT 853 · PERSISTENT TCP/TLS</text><text x="25" y="128" fill="#6b5e4f" font-size="10">client</text><text x="133" y="128" fill="#6b5e4f" font-size="10">server</text><line x1="35" x2="35" y1="138" y2="198" stroke="#d4cbba" stroke-dasharray="2 3" stroke-width="1"/><line x1="145" x2="145" y1="138" y2="198" stroke="#d4cbba" stroke-dasharray="2 3" stroke-width="1"/><line x1="37" x2="143" y1="148" y2="160" stroke="#c0623a" stroke-width="2" marker-end="url(#arr-amber)"/><text x="90" y="143" fill="#9e4e2d" font-size="10" font-weight="500" text-anchor="middle">query</text><line x1="143" x2="37" y1="178" y2="190" stroke="#c0623a" stroke-width="2" marker-end="url(#arr-amber)"/><text x="90" y="205" fill="#9e4e2d" font-size="10" font-weight="500" text-anchor="middle">response</text><rect width="140" height="32" x="20" y="225" fill="#faf7f2" stroke="#d4cbba" stroke-width="1" filter="url(#shadow)" rx="4"/><text x="90" y="241" fill="#a39888" font-size="9" letter-spacing=".04em" text-anchor="middle">TOTAL LATENCY</text><text x="90" y="253" fill="#c0623a" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" text-anchor="middle">1 × RTT</text><text x="90" y="280" fill="#a39888" font-size="9" font-style="italic" text-anchor="middle">(handshake amortized</text><text x="90" y="292" fill="#a39888" font-size="9" font-style="italic" text-anchor="middle">across the session)</text></g></svg>