middle">IANA KSK, key_tag=20326 — hardcoded in Numa as const [u8; 256]</text><text x="360" y="646" fill="#6b5e4f" font-size="12" font-style="italic" text-anchor="middle">Trust flows up (DS records). Keys flow down (DNSKEY → RRSIG).</text><text x="360" y="664" fill="#a39888" font-size="11" text-anchor="middle">If any link breaks — wrong signature, missing DS, expired RRSIG — Numa rejects the response.</text></svg>