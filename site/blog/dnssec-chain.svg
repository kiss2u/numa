nospace" font-size="10" font-weight="600" letter-spacing=".08em">CLOUDFLARE.COM ZONE</text><rect width="320" height="38" x="80" y="138" fill="#fff" stroke="rgba(0,0,0,0.08)" filter="url(#s)" rx="6"/><text x="96" y="157" fill="#2c2418" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="600">cloudflare.com A 104.16.132.229</text><text x="96" y="170" fill="#a39888" font-size="10">The answer we want to verify</text><line x1="400" x2="440" y1="157" y2="157" stroke="#c0623a" stroke-width="1.5" marker-end="url(#arr-amber)"/><text x="412" y="149" fill="#c0623a" font-size="9" font-weight="600">signed by</text><rect width="220" height="38" x="445" y="138" fill="rgba(192,98,58,0.06)" stroke="rgba(192,98,58,0.2)" filter="url(#s)" rx="6"/><text x="461" y="155" fill="#9e4e2d" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">RRSIG</text><text x="505" y="155" fill="#6b5e4f" font-size="11">tag=34505, algo=13</text><text x="461" y="170" fill="#a39888" font-size="10">signer: cloudflare.com</text><rect width="320" height="50" x="80" y="192" fill="#fff" stroke="rgba(0,0,0,0.08)" filter="url(#s)" rx="6"/><text x="96" y="211" fill="#2c2418" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">DNSKEY</text><text x="156" y="211" fill="#6b5e4f" font-size="11">cloudflare.com, tag=34505</text><text x="96" y="228" fill="#6b7c4e" font-size="11" font-weight="500">ECDSA P-256</text><text x="194" y="228" fill="#a39888" font-size="10">— 174ns to verify</text><path fill="none" stroke="#c0623a" stroke-width="1.5" marker-end="url(#arr-amber)" d="M 555 176 L 555 192 L 400 192 L 400 200"/><text x="460" y="189" fill="#c0623a" font-size="9" font-weight="600">verified with</text><rect width="640" height="132" x="40" y="270" fill="none" stroke="rgba(0,0,0,0.06)" stroke-dasharray="4 3" rx="8"/><text x="56" y="288" fill="#a39888" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" letter-spacing=".08em">.COM TLD ZONE</tex